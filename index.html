<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Flap Display Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="controls">
        <select id="devLocSelect">
            <option value="" disabled selected>Standort...</option>
        </select>
        <select id="lineSelect">
            <option value="" disabled selected>Linie...</option>
        </select>
        <label>
            <input type="checkbox" id="einsatzCheck"> Einsatzwagen
        </label>
        <select id="destSelect" disabled>
            <option value="" disabled selected>Ziel...</option>
        </select>
        <button id="triggerBtn" disabled>Go</button>
        <button id="resetBtn">Reset</button>
    </div>

    <div class="device-case">
        <div class="rubber-frame">
            <div class="glass-reflection"></div>
            <div class="display-container">
                <!-- Left Side Container (Platform over Line) -->
                <div class="module-left">
                    <div class="static-platform">
                        <div class="platform-label">Bahnsteig</div>
                        <div class="platform-number">1</div>
                    </div>
                    <div class="module module-line" id="lineModule">
                        <div class="flap-container" id="lineFlaps">
                            <!-- Flaps will be generated here -->
                        </div>
                    </div>
                </div>

                <!-- Right Side Container -->
                <div class="module-right">
                    <!-- Route Module (Top Right) -->
                    <div class="module module-route" id="routeModule">
                        <div class="flap-container" id="routeFlaps">
                            <!-- Flaps will be generated here -->
                        </div>
                    </div>

                    <!-- Destination Module (Bottom Right) -->
                    <div class="module module-destination" id="destModule">
                        <div class="flap-container" id="destFlaps">
                            <!-- Flaps will be generated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
